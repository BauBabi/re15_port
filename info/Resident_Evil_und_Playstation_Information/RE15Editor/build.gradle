plugins {
    id "java"
    id("com.github.johnrengelman.shadow") version "6.0.0"
}

//To run the class name from command line using gradle run
//mainClassName = 'baubabi.reeditor.start.Main'

repositories {
    mavenCentral()
}

dependencies {
    implementation "org.projectlombok:lombok:1.18.22"
    implementation group: 'org.apache.logging.log4j', name: 'log4j-api', version: '2.11.2'
    implementation group: 'org.apache.logging.log4j', name: 'log4j-core', version: '2.11.2'
    implementation group: 'org.apache.logging.log4j', name: 'log4j-jcl', version: '2.11.0'
    implementation group: 'commons-io', name: 'commons-io', version: '2.11.0'
    implementation 'com.google.guava:guava:31.1-jre'
    implementation group: 'org.apache.commons', name: 'commons-lang3', version: '3.12.0'
    implementation group: 'commons-codec', name: 'commons-codec', version: '1.16.0'
    implementation group: 'javax.xml.bind', name: 'jaxb-api', version: '2.1'
    implementation 'org.jetbrains:annotations:23.0.0'

    testImplementation 'junit:junit:4.13.1'
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.8.1'
    testImplementation 'org.mockito:mockito-inline:4.0.0'
    testImplementation 'org.mockito:mockito-junit-jupiter:4.0.0'

    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.8.1'
    compileOnly "org.projectlombok:lombok:1.18.16"
    testCompileOnly "org.projectlombok:lombok:1.18.16"

    annotationProcessor "org.projectlombok:lombok:1.18.16"
    testAnnotationProcessor "org.projectlombok:lombok:1.18.16"

}

test {
    useJUnit()
}

version = "1.0.0" // Assign your project version here

tasks.register("prepareRelease", Copy) {
    mkdir "prepareRelease"
    mkdir "release"
    from("${buildDir}/libs")
    into("prepareRelease")
    include("*.jar")
    from("${projectDir}/src/resources")
    into("prepareRelease")
    include("Start.bat")
}

tasks.register("packageDistribution", Zip) {
    dependsOn(prepareRelease)
    archiveFileName = "Release.zip"
    destinationDirectory = file ("${projectDir}/release")

    from ("prepareRelease")
}

tasks.register("checkZipping", Exec) {
    dependsOn(packageDistribution)
    workingDir "${projectDir}"
    commandLine "ls", "prepareRelease"
    commandLine "ls", "release"
}

jar {
    manifest {
        attributes(
                'Main-Class': 'baubabi.reeditor.core.main.Main'
        )
    }
}